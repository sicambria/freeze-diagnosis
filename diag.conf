#!/bin/bash
# freeze-diag configuration
# Source this file before running any collector or launcher.
# Do NOT edit while collectors are running.

# ---- Paths ----
FD_ROOT="${FD_ROOT:-$HOME/.local/share/freeze-diag}"
FD_LIB="$FD_ROOT/lib"
FD_LOGS="$FD_ROOT/logs"
FD_ARCHIVE="$FD_ROOT/archive"
FD_REPORTS="$FD_ROOT/reports"
FD_PID_DIR="${FD_PID_DIR:-/tmp}"

# ---- Intervals (seconds) ----
FD_HEARTBEAT_INTERVAL=1
FD_FAST_INTERVAL=5
FD_GPU_INTERVAL=5
FD_CPU_INTERVAL=2
FD_WATCHDOG_INTERVAL=10
FD_DETAILED_INTERVAL=60

# ---- Segment rotation (seconds) ----
FD_HEARTBEAT_SEGMENT=600    # 10 min
FD_FAST_SEGMENT=600
FD_GPU_SEGMENT=600
FD_CPU_SEGMENT=600
FD_WATCHDOG_SEGMENT=600
FD_DETAILED_SEGMENT=3600    # 60 min
FD_DMESG_SEGMENT=900        # 15 min

# ---- Retention & Space ----
FD_RETENTION_MINUTES=129600 # keep segments for 90 days (90*24*60)
FD_MAX_DISK_MB=5000         # hard cap on logs total; must be large enough
                            # to actually hold the retention window, else
                            # size-prune deletes oldest first anyway.
                            # Crash bundles in archive/ are never pruned.

# ---- amdgpu ----
FD_AMDGPU_DEBUG_MASK=1      # 0x1 = AMD_DEBUG_INFO; set to 0 to disable
FD_AMDGPU_CARD_PATH="/sys/class/drm/card1/device"

# ---- hwmon sensors ----
# "auto" = resolve by chip name at collector startup. hwmonN numbering
# is NOT stable across boots (probe order), so hardcoded paths silently
# break and temps read 0. Set an explicit path only if auto-detect fails.
FD_CPU_HWMON_PATH="auto"
FD_CPU_HWMON_NAME="k10temp"
FD_AMDGPU_HWMON_PATH="auto"
FD_AMDGPU_HWMON_NAME="amdgpu"
FD_NVME_HWMON_PATH="auto"
FD_NVME_HWMON_NAME="nvme"

# ---- Process targets (pgrep patterns) ----
# Space-separated list (bash arrays don't export to child processes)
FD_TARGETS="opencode kilo Xorg firefox"

# ---- Dmesg/journal (require sudo) ----
FD_DMESG_CMD="sudo dmesg -w --time-format iso"
FD_JOURNAL_CMD="sudo journalctl -f -p warn --no-pager -o short-iso"

# ---- amdgpu debug_mask set command (sudo) ----
FD_AMDGPU_DEBUG_MASK_CMD="sudo tee /sys/module/amdgpu/parameters/debug_mask"

# ---- pstore dump helper (root-owned, installed by diag-start.sh --install) ----
FD_PSTORE_DUMP_BIN="/usr/local/bin/fd-pstore-dump"

# ---- Export essential vars for child processes (collectors) ----
export FD_ROOT FD_LIB FD_LOGS FD_ARCHIVE FD_REPORTS FD_PID_DIR
export FD_HEARTBEAT_INTERVAL FD_FAST_INTERVAL FD_GPU_INTERVAL FD_CPU_INTERVAL FD_WATCHDOG_INTERVAL FD_DETAILED_INTERVAL
export FD_HEARTBEAT_SEGMENT FD_FAST_SEGMENT FD_GPU_SEGMENT FD_CPU_SEGMENT FD_WATCHDOG_SEGMENT FD_DETAILED_SEGMENT FD_DMESG_SEGMENT
export FD_RETENTION_MINUTES FD_MAX_DISK_MB
export FD_AMDGPU_DEBUG_MASK FD_AMDGPU_CARD_PATH
export FD_CPU_HWMON_PATH FD_CPU_HWMON_NAME FD_AMDGPU_HWMON_PATH FD_AMDGPU_HWMON_NAME FD_NVME_HWMON_PATH FD_NVME_HWMON_NAME
export FD_TARGETS
export FD_DMESG_CMD FD_JOURNAL_CMD FD_AMDGPU_DEBUG_MASK_CMD FD_PSTORE_DUMP_BIN
