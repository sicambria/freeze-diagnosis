#!/bin/bash
# freeze-diag configuration
# Source this file before running any collector or launcher.
# Do NOT edit while collectors are running.

# ---- Paths ----
FD_ROOT="${FD_ROOT:-$HOME/.local/share/freeze-diag}"
FD_LIB="$FD_ROOT/lib"
FD_LOGS="$FD_ROOT/logs"
FD_ARCHIVE="$FD_ROOT/archive"
FD_REPORTS="$FD_ROOT/reports"
FD_PID_DIR="${FD_PID_DIR:-/tmp}"

# ---- Intervals (seconds) ----
FD_HEARTBEAT_INTERVAL=1
FD_FAST_INTERVAL=5
FD_GPU_INTERVAL=5
FD_WATCHDOG_INTERVAL=10
FD_DETAILED_INTERVAL=60

# ---- Segment rotation (seconds) ----
FD_HEARTBEAT_SEGMENT=600    # 10 min
FD_FAST_SEGMENT=600
FD_GPU_SEGMENT=600
FD_WATCHDOG_SEGMENT=600
FD_DETAILED_SEGMENT=3600    # 60 min
FD_DMESG_SEGMENT=900        # 15 min

# ---- Retention & Space ----
FD_RETENTION_MINUTES=120    # keep segments for 2 hours
FD_MAX_DISK_MB=100          # hard cap on logs+archive total

# ---- amdgpu ----
FD_AMDGPU_DEBUG_MASK=1      # 0x1 = AMD_DEBUG_INFO; set to 0 to disable
FD_AMDGPU_CARD_PATH="/sys/class/drm/card1/device"
FD_AMDGPU_HWMON_PATH="/sys/class/hwmon/hwmon11"

# ---- CPU / system ----
FD_CPU_HWMON_PATH="/sys/class/hwmon/hwmon7"
FD_NVME_HWMON_PATH="/sys/class/hwmon/hwmon4"

# ---- Process targets (pgrep patterns) ----
# Space-separated list (bash arrays don't export to child processes)
FD_TARGETS="opencode kilo Xorg"

# ---- Dmesg/journal (require sudo) ----
FD_DMESG_CMD="sudo dmesg -w --time-format iso"
FD_JOURNAL_CMD="sudo journalctl -f -p warn --no-pager -o short-iso"

# ---- amdgpu debug_mask set command (sudo) ----
FD_AMDGPU_DEBUG_MASK_CMD="sudo tee /sys/module/amdgpu/parameters/debug_mask"

# ---- Export essential vars for child processes (collectors) ----
export FD_ROOT FD_LIB FD_LOGS FD_ARCHIVE FD_REPORTS FD_PID_DIR
export FD_HEARTBEAT_INTERVAL FD_FAST_INTERVAL FD_GPU_INTERVAL FD_WATCHDOG_INTERVAL FD_DETAILED_INTERVAL
export FD_HEARTBEAT_SEGMENT FD_FAST_SEGMENT FD_GPU_SEGMENT FD_WATCHDOG_SEGMENT FD_DETAILED_SEGMENT FD_DMESG_SEGMENT
export FD_RETENTION_MINUTES FD_MAX_DISK_MB
export FD_AMDGPU_DEBUG_MASK FD_AMDGPU_CARD_PATH FD_AMDGPU_HWMON_PATH
export FD_CPU_HWMON_PATH FD_NVME_HWMON_PATH
export FD_TARGETS
export FD_DMESG_CMD FD_JOURNAL_CMD FD_AMDGPU_DEBUG_MASK_CMD
